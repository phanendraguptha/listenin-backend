events {
    worker_connections 1024;
}

http {
    # Redirect HTTP (80) to HTTPS (443)
    server {
        listen 80;
        server_name api.phanendraguptha.com;
	if ($http_x_forwarded_proto != "https") {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name api.phanendraguptha.com;

        # Paths to the certificates generated by Certbot
        ssl_certificate /etc/letsencrypt/live/api.phanendraguptha.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.phanendraguptha.com/privkey.pem;

        # Best practice SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IxP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Streaming/WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }
    }
}

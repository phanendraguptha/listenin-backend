events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Add your domain here later if you get one (e.g., server_name api.mysite.com;)
        server_name _;

        location / {
            # Proxy requests to the 'backend' service defined in docker-compose.yml
            proxy_pass http://backend:3000;

            # Essential headers for forwarding
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # If you ever implement the streaming endpoint (/stream) or WebSockets,
            # these are required to keep the connection open:
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }
    }
}

